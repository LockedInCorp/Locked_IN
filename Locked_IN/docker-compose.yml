services:
  app:
    build: .                 
    container_name: locked_in_app
    ports:
      - "5100:8080"         
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    restart: on-failure
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Host=db;Port=5432;Database=locked_in;Username=postgres;Password=postgres;TrustServerCertificate=true;
      - Minio__Endpoint=minio:9000
      - Minio__AccessKey=minioadmin
      - Minio__SecretKey=minioadmin
      - Minio__Secure=false
      - Minio__PublicUrl=http://localhost:9000
      - Jwt__Secret=ubZrFRmCUbCSvuRqpDCwJQRJO0BhA2WddzMhzKr8eW1
      - Jwt__Issuer=Locked_IN_Backend
      - Jwt__Audience=Locked_IN_Frontend

  db:
    image: postgres:15
    container_name: locked_in_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: locked_in
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: locked_in_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data 
    ports:
      - "9000:9000" 
      - "9001:9001" 

volumes:
  postgres_data:
  minio_data:
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignalR Chat Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@7.0.0/dist/browser/signalr.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .panel {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
        }
        .messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            background: #f9f9f9;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            background: white;
            border-radius: 4px;
        }
        .message-header {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .message-content {
            color: #666;
        }
        .message-time {
            font-size: 0.8em;
            color: #999;
        }
        input, button {
            padding: 8px;
            margin: 5px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .status {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        .log {
            font-family: monospace;
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>SignalR Chat Test Client</h1>
    
    <div class="container">
        <!-- Connection Panel -->
        <div class="panel">
            <h2>Connection</h2>
            <div id="status" class="status disconnected">Disconnected</div>
            <div>
                <label>Hub URL:</label>
                <input type="text" id="hubUrl" value="http://localhost:5122/chathub" style="width: 100%;">
            </div>
            <div>
                <label>Chat ID:</label>
                <input type="number" id="chatId" value="1" style="width: 100px;">
            </div>
            <div>
                <label>User ID:</label>
                <input type="number" id="userId" value="1" style="width: 100px;">
            </div>
            <button id="connectBtn" onclick="connect()">Connect</button>
            <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
            <button onclick="createChat()">Create New Chat</button>
            <button onclick="joinGroup()">Join Chat (API + SignalR)</button>
            <button onclick="leaveGroup()">Leave Chat Group</button>
            <button onclick="createTestUsers()" style="background: #28a745;">Setup Test Users</button>
        </div>

        <!-- Messages Panel -->
        <div class="panel">
            <h2>Messages</h2>
            <div id="messages" class="messages"></div>
            <div>
                <input type="text" id="messageInput" placeholder="Type a message..." style="width: 70%;" onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <!-- Event Log -->
    <div class="panel" style="margin-top: 20px;">
        <h2>Event Log</h2>
        <div id="log" class="log"></div>
    </div>

    <script>
        let connection = null;
        const chatId = document.getElementById('chatId');
        const userId = document.getElementById('userId');
        const hubUrl = document.getElementById('hubUrl');
        const messagesDiv = document.getElementById('messages');
        const logDiv = document.getElementById('log');
        const statusDiv = document.getElementById('status');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');

        function log(message) {
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] ${message}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateStatus(connected) {
            if (connected) {
                statusDiv.textContent = 'Connected';
                statusDiv.className = 'status connected';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
            } else {
                statusDiv.textContent = 'Disconnected';
                statusDiv.className = 'status disconnected';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
            }
        }

        function connect() {
            const url = hubUrl.value;
            log(`Connecting to ${url}...`);

            connection = new signalR.HubConnectionBuilder()
                .withUrl(url, {
                    skipNegotiation: false,
                    transport: signalR.HttpTransportType.WebSockets | signalR.HttpTransportType.ServerSentEvents | signalR.HttpTransportType.LongPolling
                })
                .withAutomaticReconnect()
                .build();

            // Connection events
            connection.onclose(() => {
                log('Connection closed');
                updateStatus(false);
            });

            connection.onreconnecting(() => {
                log('Reconnecting...');
            });

            connection.onreconnected(() => {
                log('Reconnected');
                updateStatus(true);
            });

            // Chat events
            connection.on("ReceiveMessage", (message) => {
                log(`Received message: ${JSON.stringify(message)}`);
                addMessage(message.senderNickname, message.content, message.sentAt, message);
            });

            connection.on("MessageEdited", (message) => {
                log(`Message edited: ${JSON.stringify(message)}`);
                addMessage(message.senderNickname, `✏️ ${message.content} (edited)`, message.sentAt, message);
            });

            connection.on("MessageDeleted", (messageId) => {
                log(`Message deleted: ${messageId}`);
                addMessage("System", `🗑️ Message ${messageId} was deleted`, new Date());
            });

            connection.on("MessageRead", (data) => {
                log(`Message read by user ${data.userId} at ${data.readAt}`);
            });

            connection.on("UserJoined", (connectionId) => {
                log(`User joined: ${connectionId}`);
            });

            connection.on("UserLeft", (connectionId) => {
                log(`User left: ${connectionId}`);
            });

            connection.start()
                .then(() => {
                    log('Connected successfully!');
                    updateStatus(true);
                })
                .catch(err => {
                    log(`Connection error: ${err}`);
                    updateStatus(false);
                });
        }

        function disconnect() {
            if (connection) {
                connection.stop();
                log('Disconnected');
                updateStatus(false);
            }
        }

        async function joinGroup() {
            const id = chatId.value;
            const currentUserId = userId.value;
            
            if (!connection || connection.state !== signalR.HubConnectionState.Connected) {
                log('Not connected. Please connect first.');
                return;
            }

            try {
                // First, join as database participant via API
                const joinResponse = await fetch(`http://localhost:5122/api/chat/${id}/join?userId=${currentUserId}`, {
                    method: 'POST'
                });

                if (joinResponse.ok) {
                    log(`Joined chat as participant (database)`);
                    
                    // Then join SignalR group for real-time communication
                    await connection.invoke("JoinChatGroup", id);
                    log(`Joined SignalR group: Chat_${id}`);
                } else {
                    const error = await joinResponse.json();
                    log(`Error joining chat: ${error.message || 'Unknown error'}`);
                    
                    // Still try to join SignalR group (might already be a participant)
                    try {
                        await connection.invoke("JoinChatGroup", id);
                        log(`Joined SignalR group: Chat_${id} (but not database participant)`);
                    } catch (err) {
                        log(`Error joining SignalR group: ${err}`);
                    }
                }
            } catch (error) {
                log(`Error: ${error.message}`);
            }
        }

        async function createTestUsers() {
            log('Creating test users in database...');
            try {
                // This would require a backend endpoint, but for now we'll use SQL script
                log('⚠️ Please run the SQL script: SqlData/InsertTestUsers.sql');
                log('Or use psql: psql -d locked_in -f SqlData/InsertTestUsers.sql');
                log('Users 1-6 will be created/updated');
            } catch (error) {
                log(`Error: ${error.message}`);
            }
        }

        async function createChat() {
            const currentUserId = userId.value;
            const participant2Id = prompt('Enter second user ID for direct chat (default: 2):', '2');
            
            if (!participant2Id) {
                log('Chat creation cancelled');
                return;
            }

            try {
                // First verify users exist
                log(`Creating chat between user ${currentUserId} and user ${participant2Id}...`);
                
                const response = await fetch(`http://localhost:5122/api/chat?userId=${currentUserId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        type: "Direct",
                        name: null,
                        teamId: null,
                        participantUserIds: [parseInt(currentUserId), parseInt(participant2Id)]
                    })
                });

                if (response.ok) {
                    const chat = await response.json();
                    chatId.value = chat.id;
                    log(`✅ Chat created! Chat ID: ${chat.id}`);
                    log('Now click "Join Chat (API + SignalR)" to join');
                } else {
                    const error = await response.json();
                    const errorMsg = error.message || 'Unknown error';
                    log(`❌ Error creating chat: ${errorMsg}`);
                    
                    if (errorMsg.includes('not found') || errorMsg.includes('Creator user')) {
                        log('');
                        log('💡 SOLUTION: Run the SQL script to create test users:');
                        log('   psql -d locked_in -f Locked_IN_Backend/SqlData/InsertTestUsers.sql');
                        log('   Or execute: SqlData/InsertTestUsers.sql in your database');
                        log('');
                        log('This will create users with IDs 1-6');
                    }
                }
            } catch (error) {
                log(`Error: ${error.message}`);
            }
        }

        async function leaveGroup() {
            const id = chatId.value;
            const currentUserId = userId.value;
            
            if (connection && connection.state === signalR.HubConnectionState.Connected) {
                try {
                    // Leave SignalR group
                    await connection.invoke("LeaveChatGroup", id);
                    log(`Left SignalR group: Chat_${id}`);
                    
                    // Optionally leave database participant (uncomment if needed)
                    // const leaveResponse = await fetch(`http://localhost:5122/api/chat/${id}/leave?userId=${currentUserId}`, {
                    //     method: 'POST'
                    // });
                    // if (leaveResponse.ok) {
                    //     log(`Left chat as participant (database)`);
                    // }
                } catch (err) {
                    log(`Error leaving group: ${err}`);
                }
            } else {
                log('Not connected. Please connect first.');
            }
        }

        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const content = messageInput.value.trim();
            const currentChatId = chatId.value;
            const currentUserId = userId.value;

            if (!content) return;

            if (!connection || connection.state !== signalR.HubConnectionState.Connected) {
                log('Not connected. Please connect first.');
                return;
            }

            try {
                // Send via REST API (persistence first)
                const response = await fetch(`http://localhost:5122/api/chat/messages?userId=${currentUserId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chatId: parseInt(currentChatId),
                        content: content,
                        attachmentUrl: null
                    })
                });

                if (response.ok) {
                    const message = await response.json();
                    log(`Message sent via API: ${message.id}`);
                    messageInput.value = '';
                    // SignalR will broadcast automatically via the controller
                } else {
                    const error = await response.json();
                    log(`Error sending message: ${error.message || 'Unknown error'}`);
                }
            } catch (error) {
                log(`Error: ${error.message}`);
            }
        }

        function addMessage(sender, content, timestamp, fullMessage = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            const time = timestamp ? new Date(timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
            
            messageDiv.innerHTML = `
                <div class="message-header">${sender}</div>
                <div class="message-content">${content}</div>
                <div class="message-time">${time}</div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Initialize
        log('SignalR Chat Test Client Ready');
        log('⚠️ IMPORTANT: This file must be served via HTTP, not opened directly!');
        log('');
        log('📋 SETUP INSTRUCTIONS:');
        log('1. FIRST: Create test users in database:');
        log('   Run: ./SqlData/run-test-users.sh');
        log('   Or: psql -d locked_in -f SqlData/InsertTestUsers.sql');
        log('');
        log('2. Start a local HTTP server:');
        log('   - Python: python3 -m http.server 8080');
        log('   - Node.js: npx http-server -p 8080');
        log('   - Or use: ./serve-test.html.sh');
        log('');
        log('3. Open http://localhost:8080/TestSignalR.html in your browser');
        log('4. Make sure your backend is running on http://localhost:5122');
        log('5. Click Connect to establish SignalR connection');
        log('6. Click "Create New Chat" (uses User IDs 1 and 2 by default)');
        log('7. Click "Join Chat (API + SignalR)" to join as participant');
        log('8. Send messages via the input field');
        log('9. Open multiple browser tabs (different User IDs) to test real-time');
        log('');
        log('👥 Available Test Users:');
        log('   User 1: JohnDoe | User 2: JaneSmith | User 3: MikeWilson');
        log('   User 4: SarahJ | User 5: TestUser5 | User 6: TestUser6');
        
        // Check if opened via file:// protocol
        if (window.location.protocol === 'file:') {
            log('');
            log('❌ ERROR: File opened via file:// protocol!');
            log('Please use an HTTP server instead. See instructions above.');
        }
    </script>
</body>
</html>
